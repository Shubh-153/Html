<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        p.uppercase{
            text-transform: uppercase;
        }
        p.lowercase{
            text-transform: lowercase
            ;
        }
        p.capitalized{
            text-transform: capitalize;
        }
    </style>
</head>
<body>
    <h1>Using the text-transfrom property</h1>
    <p class="uppercase">This is transformed to uppercase</p>
    <p class="lowercase">This is transformed to lowercase</p>
    <p class="capitalized">This text <span style="text-transform: none;">is</span> capitalized</p>
</body>
</html>
