<!DOCTYPE html>
<html>
<head>
<style>
.menu {
  background-color: darkgreen;
  padding: 14px;
  text-align:center
}

.menu a {
  display:inline-block;
  color: white;
  margin:10px;
  text-decoration: none;
  font-size: 18px;
  transition: background-color 0.3s, transform 0.2s;
}

/* Hover effect */
.menu a:hover {
  background-color: lightgray;
  color: black;
  transform: scale(1.5);
}

/* Active link */
.menu a:active {
  background-color: yellow;
}
</style>
</head>
<body>

<h2>Stylish Navigation Bar</h2>
<div class="menu">
  <a href="#home">Home</a>
  <a href="#news">News</a>
  <a href="#contact">Contact</a>
  <a href="#about">About</a>
</div>
</body>
</html>
