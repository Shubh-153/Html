<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table{
            border: 1px solid;
            border-collapse: collapse;
            width: 70px;
        }
        td{
            height: 100%;
            vertical-align: bottom;
        }
        th,td{
            padding: 8px;
            height: 70px;
            border-bottom: 2px solid red;
            text-align: right;
        }
        caption{
            caption-side: bottom;
        }
        tr:nth-child(even){background-color: orange;}
        tr:nth-child(odd){background-color: red;}
        tr:hover{background-color: rgb(255, 153, 0);}
    </style>
</head>
<body>
    <h2>Siongle Border Around The table</h2>
    <table>
        <caption>Table 1.1 Customers</caption>
        <tr>
     <th>Firstname</th>
    <th>Lastname</th>
  </tr>
  <tr>
    <td>Peter</td>
    <td>Griffin</td>
  </tr>
  <tr>
    <td>Lois</td>
    <td>Griffin</td>
  </tr>
    </table>
</body>
</html>
