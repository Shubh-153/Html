<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gmail sign up</title>
</head>
<body>
    <h1>Create your Google Account</h1>
    <fieldset>
        <form action="" method="post">
            <label for="">First and last name</label><br>
            <input type="text" id="firstName" name="firstName" required placeholder="First name">
            <input type="text" id="lastName" name="lastName" required placeholder="Last name"><br><br>
            <label for="">Choose your username</label><br>
            <input type="text" id="username" name="username" required placeholder="Username"><br>
            <small>You can use letters, numbers & periods</small><br><br>
            <label for="">Create a password</label><br>
            <input type="password" id="password" name="password" required placeholder="Password"><br><br>
            <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Confirm"><br><br>
            <small>Use 8 or more characters with a mix of letters, numbers & symbols</small><br><br>
            <input type="submit" value="Next">
        </form><br><br>
</body>
</html>
