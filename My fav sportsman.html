<!DOCTYPE html>
<html lang="en">
<head>
    <title>My Favorite Sportsman</title>
    <style>
        body {
            background-color: #f0f0f0;
            color: #333;
        }
        .page-container {
            background-color: #ffffff;
        }
        .header-banner {
            background-color: #1a1a1a;
            color: #ffd700;
        }
        .intro {
            background-color: #e8f4f8;
            color: #0066cc;
        }
        .achievements-section {
            background-color: #f9f9f9;
            color: #333;
        }
        table {
            background-color: #ffffff;
            color: #333;
        }
        thead {
            background-color: #4CAF50;
            color: #ffffff;
        }
        tbody tr:nth-child(odd) {
            background-color: #f2f2f2;
        }
        tbody tr:nth-child(even) {
            background-color: #ffffff;
        }
        .fanmail-section {
            background-color: #fff3cd;
            color: #333;
        }
        input, textarea {
            background-color: #ffffff;
            color: #333;
            border: 1px solid #ccc;
        }
        button {
            background-color: #ff6b6b;
            color: #ffffff;
        }
        footer {
            background-color: #333;
            color: #ffffff;
        }
    </style>
</head>
<body>
    <div class="page-container">
        <header class="header-banner">
            <h1>THE GREATEST: VIRAT KOHLI</h1>
        </header>
        <p class="intro">Welcome to the dedicated page for my favorite athlete...</p>
        <section class="achievements-section">
            <h2>Career Highlights</h2>
            <table>
                <thead>
                    <tr>
                        <th>Year</th>
                        <th>Tournament/Event</th>
                        <th>Result/Record</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td>2024</td><td>ICC T20 World Cup</td><td>T20 world cup Title</td></tr>
                    <tr><td>2025</td><td>ICC Champions Trophy</td><td>Champions Trophy</td></tr>
                </tbody>
            </table>
        </section>
        <section class="fanmail-section">
            <h2>Send Fan Mail</h2>
            <form class="fanmail-form">
                <label for="">Name:</label>
                <input type="text" placeholder="Your Name"><br>
                <label for="">Email:</label>
                <input type="email" placeholder="Your Email"><br>
                <label for="">Message:</label>
                <textarea placeholder="Your message of support..."></textarea>
                <button type="submit">SEND</button>
            </form>
        </section>
        <footer><p>&copy; 2025 Fan Page</p></footer>
    </div>
</body>
</html>
