<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University admission form</title>
</head>
<body>
    <h1>University admission form </h1>
    <fieldset>
        <legend>Personal Information</legend>
        <label for="">Name</label>
        <input type="text"><br>
        <label for="">Date of Birth</label>
        <input type="date"><br>
        <label>Gender</label>
        <input type="radio">
        <label>Male</label>
        <input type="radio">
        <label>Female</label><br>
        <label for="">Email</label>
        <input type="email"><br>
        <label for="">Contact Number</label>
        <input type="tel"><br>
        <label for="">Address</label>
        <textarea placeholder="Enter your Address" name="" id="" cols="30" rows="10"></textarea>
    </fieldset>
    <fieldset>
        <legend>Academic Details</legend>
        <label for="">High School Name:</label>
        <input type="text"><br>
        <label for="">Year of Graduation</label>
        <input type="number"><br>
        <label for="">GPA:</label>
        <input type="number" step="0.01" min="0" max="4.0"><br>
        <label for="">Intended Major</label>
        <select name="" id="">
            <option value="">Computer Science</option>
            <option value="">Business</option>
            <option value="">Engineering</option>
            <option value="">Biology</option>
            <option value="">Psychology</option>
        </select><br>
        <label for="">Upload Transcript:</label>
        <input type="file" accept=".pdf,.doc,.docx">
    </fieldset>
    <fieldset>
        <legend>Additional Information</legend>
        <label for="">Extracurricular Activities:</label>
        <textarea name="" id="" cols="30" rows="10"></textarea><br>
        <label for="">Do you need scholarship?</label>
        <input type="checkbox"> Yes<br>
        <label for="">Agree to Terms:</label>
        <input type="checkbox"> 
    </fieldset>
    <button type="submit">Submit Application</button>
</body>
</html>
