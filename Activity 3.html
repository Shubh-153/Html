<!DOCTYPE html>
<html>
<head>
    <title>Activity 3 - HTML Forms</title>
</head>
<body>
    <h1>HTML Forms Activity</h1>

    <h2>Student Registration Form</h2>
    <form>
        <label>First Name:</label><br>
        <input type="text" name="firstname" placeholder="Enter your first name"><br><br>

        <label>Last Name:</label><br>
        <input type="text" name="lastname" placeholder="Enter your last name"><br><br>

        <label>Email:</label><br>
        <input type="email" name="email" placeholder="Enter your email"><br><br>

        <label>Date of Birth:</label><br>
        <input type="date" name="dob"><br><br>

        <label>Gender:</label><br>
        <input type="radio" name="gender" value="male"> Male
        <input type="radio" name="gender" value="female"> Female
        <input type="radio" name="gender" value="other"> Other<br><br>

        <label>Course:</label><br>
        <select name="course">
            <option value="">-- Select Course --</option>
            <option value="webdev">Web Development</option>
            <option value="python">Python Programming</option>
            <option value="java">Java Programming</option>
            <option value="datascience">Data Science</option>
        </select><br><br>

        <label>Interests:</label><br>
        <input type="checkbox" name="interest" value="coding"> Coding<br>
        <input type="checkbox" name="interest" value="design"> Design<br>
        <input type="checkbox" name="interest" value="database"> Database<br><br>

        <label>Message:</label><br>
        <textarea name="message" rows="4" cols="40" placeholder="Write something about yourself..."></textarea><br><br>

        <input type="submit" value="Register">
        <input type="reset" value="Clear">
    </form>
</body>
</html>
