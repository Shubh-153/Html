<!DOCTYPE html>
<html>
<body>
<h2 id="check">JavaScript Math.random()</h2>
<p id="demo"></p>
<script>
let text;
let num=Math.random();
if (num < 0.5) {
  text = "<a href='https://www.google.com/'>Visit Google</a>";
} else {
  text = "<a href='https://ums.lpu.in/lpuums/'>Visit UMS</a>";
 }
document.getElementById("demo").innerHTML =text;
document.getElementById("check").innerHTML=num;
</script>
</body>
</html>
